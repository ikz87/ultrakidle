<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/webp" href="/images/v1-plush.webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="ULTRAKIDLE - The daily character guessing game for machines." />
  <meta property="og:title" content="ULTRAKIDLE" />
  <meta property="og:site_name" content="ULTRAKIDLE" />
  <meta property="og:description" content="The daily character guessing game for machines" />
  <meta property="og:image" content="https://ultrakidle.online/images/og-thumbnail.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="ULTRAKIDLE" />
  <meta name="twitter:description" content="The daily character guessing game for machines" />
  <meta name="twitter:image" content="https://ultrakidle.online/images/og-thumbnail.png" />
  <meta name="theme-color" content="#ef4444" />
  <title>ULTRAKIDLE</title>
</head>

<body>
  <style>
    @font-face {
      font-family: 'VCR OSD Mono';
      src: url('/fonts/VCR_OSD_MONO_1.001.ttf') format('truetype');
    }

    #splash-loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      width: 100%;
      background: #000;
      gap: 1.5rem;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
    }

    #splash-loader img {
      max-width: 320px;
      width: 80%;
    }

    #splash-loader .splash-text {
      font-family: 'VCR OSD Mono', monospace;
      color: #fff;
      font-size: 1rem;
      opacity: 0.5;
      letter-spacing: 0.1em;
    }

    #splash-loader .splash-dots {
      display: inline-block;
      width: 3ch;
      text-align: left;
    }

    /* CSS content trick doesn't work on spans, so we animate with pseudo-element */
    #splash-loader .splash-dots::after {
      content: '.';
      animation: dot-cycle 1.2s steps(1) infinite;
    }

    #splash-loader.fade-out {
      opacity: 0;
      transition: opacity 0.5s ease-out;
      pointer-events: none;
    }

    @keyframes dot-cycle {
      0% {
        content: '.';
      }

      33% {
        content: '..';
      }

      66% {
        content: '...';
      }
    }
  </style>
  <div id="splash-loader">
    <img src="/images/ultrakidle-logo.png" alt="ULTRAKIDLE" />
    <span class="splash-text">LOADING<span class="splash-dots"></span></span>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
